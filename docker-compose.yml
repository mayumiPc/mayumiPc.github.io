services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mayumipc-jekyll
    ports:
      - "4000:4000"
    volumes:
      - .:/site
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      # Windows のボリュームマウントでは inotify が効かないためポーリングで watch する
      LISTEN_GEM_USE_POLLING: "1"
    stdin_open: true
    tty: true
