<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <p class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></p>
      <nav class="site-nav" aria-label="主要ナビゲーション">
        <a href="{{ '/' | relative_url }}">ホーム</a>
      </nav>
    </div>
  </header>

  <main class="site-main" id="main-content">
    {% if page.path contains '_posts' %}
    <article class="post">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y年%-m月%-d日" }}</time></p>
      </header>
      <div class="post-body">
        {{ content }}
      </div>
    </article>
    {% else %}
    {{ content }}
    {% endif %}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
    </div>
  </footer>
</body>
</html>
